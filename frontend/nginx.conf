# Nginx config for serving the Vite/React single-page app (SPA)
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # If you use client-side routing (react-router), refreshing a deep link like
  # /questions/123 should still serve index.html (SPA takes over routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

