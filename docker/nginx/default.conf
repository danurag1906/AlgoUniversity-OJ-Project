# Nginx reverse proxy for the app (beginner-friendly config).
#
# Goal:
# - Browser visits https://yourdomain.com  -> frontend container
# - Browser visits https://yourdomain.com/api -> backend container
#
# In Docker Compose, service names become DNS names on the internal network:
# - http://frontend:80
# - http://backend:3001
#
# NOTE: This file is for the Nginx container inside Docker.
# TLS/HTTPS is typically handled here too, but for simplicity we start with HTTP.
# On a VPS, you'll add HTTPS (Let's Encrypt) afterwards.

server {
  listen 80;
  server_name _;

  # Allow uploading larger payloads if needed (adjust as required).
  client_max_body_size 25m;

  # Route API calls to backend
  location /api/ {
    proxy_pass http://backend:3001/;
    proxy_http_version 1.1;

    # Forward useful headers so backend can know the real client/proto/host
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else goes to frontend (static site)
  location / {
    proxy_pass http://frontend:80/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

